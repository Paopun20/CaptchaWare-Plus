name: Godot Web
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Godot
        uses: lihop/setup-godot@c20123b19b7804a9bead6412b863450c2848f1d6
        with:
          godot-version: 4.6.2
      - name: Create build folder
        run: mkdir -p build/web
      - name: Export Web
        run: |
          godot --headless --path . --editor --quit
          godot --headless --path . --export-release "Web" --verbose build/web/index.html
          ls -la ./build/web
      - name: Fix structure
        run: |
          mkdir -p public
          mv build/web/* public/
          ls -la ./public
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
